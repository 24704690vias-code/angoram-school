# ═══════════════════════════════════════════════════════════
# application-railway.properties — RAILWAY PRODUCTION
# Activated when SPRING_PROFILES_ACTIVE=railway
# ═══════════════════════════════════════════════════════════
spring.application.name=angoram-school

# Railway injects these MySQL variables automatically when you add a MySQL plugin
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Set FRONTEND_URL in Railway to your Vercel URL, e.g. https://your-app.vercel.app
frontend.url=${FRONTEND_URL}

file.upload-dir=uploads/receipts
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration
spring.security.filter.order=10
