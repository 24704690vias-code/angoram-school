# ═══════════════════════════════════════════════════════════
# application.properties — LOCAL DEVELOPMENT ONLY
# ═══════════════════════════════════════════════════════════
spring.application.name=angoram-school

spring.datasource.url=jdbc:mysql://localhost:3306/angoram_school?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

jwt.secret=angoram-school-secret-key-change-in-production-2026
jwt.expiration=86400000

# Local dev CORS — accepts any localhost port (5173, 5174, 3000 etc.)
frontend.url=http://localhost:5173

file.upload-dir=uploads/receipts
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration

# Ensure security filter runs after multipart is parsed
spring.security.filter.order=10

